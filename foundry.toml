[profile.default]
src = "src"
out = "out"
libs = ["lib"]
via_ir = true
optimizer = true
optimizer_runs = 200

# RPC endpoints
[rpc_endpoints]
unichain-sepolia = "https://sepolia.unichain.org"
base-sepolia = "${BASE_SEPOLIA_RPC}"
base = "${BASE_RPC}"

# Etherscan API configuration for contract verification
[etherscan]
unichain-sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.uniscan.xyz/api" }
base-sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
